# Instruction finetuning config — Alpaca-cleaned + anti-forgetting FineWeb
# Resume from best pretrain checkpoint

pretrain_checkpoint: checkpoints/pretrain/latest.pt
data_dir: data/finetune
output_dir: checkpoints/finetune

# Lower LR for SFT (standard practice)
learning_rate: 2.0e-5
min_lr: 3.0e-6
warmup_iters: 0
max_iters: 1500
beta1: 0.9
beta2: 0.95
weight_decay: 0.01
grad_clip: 1.0

# Batch
batch_size: 4
gradient_accumulation_steps: 32

# Enable dropout during finetuning
dropout: 0.1

# Logging
log_interval: 50
eval_interval: 200
eval_iters: 50

wandb_project: "llm-350m-finetune"
compile: true
seed: 42
